<!DOCTYPE html>
<html>
<head>
  <title>Yash QA AI Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #0f172a;
      --text: #ffffff;
      --card: #1e293b;
      --input: #020617;
      --accent: #22c55e;
    }

    body.light {
      --bg: #f8fafc;
      --text: #0f172a;
      --card: #e2e8f0;
      --input: #ffffff;
      --accent: #16a34a;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-x: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      background: var(--input);
      border-bottom: 1px solid #334155;

      width: 100%;
      box-sizing: border-box
    }

    .toggle-btn {
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      background: var(--card);
      color: var(--text);
    }

    #chat {
     flex: 1;
     overflow-y: auto;
     padding: 15px;
     box-sizing: border-box;
     width: 100%;
   }

    .message {
      max-width: 70%;
      margin: 10px 0;
    }

    .bubble {
      padding: 12px;
      border-radius: 12px;
      white-space: pre-wrap;
    }

    .user .bubble {
      background: #2563eb;
      color: white;
      margin-left: auto;
    }

    .bot .bubble {
      background: var(--card);
    }

    .actions {
      display: none;
      margin-top: 5px;
      gap: 10px;
    }

    .message:hover .actions {
      display: flex;
    }

    .actions button {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--accent);
      font-size: 12px;
    }

    .controls {
      padding: 10px 20px;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: var(--card);
      color: var(--text);
    }

    .input-area {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: var(--input);
  position: sticky;
  bottom: 0;
  width: 100%;
  box-sizing: border-box;
}

    textarea {
      flex: 1;
      height: 50px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: var(--card);
      color: var(--text); 
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }

    button.send {
      background: var(--accent);
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    pre {
      margin: 0;
      overflow-x: auto;
      font-size: 13px;
    }

    .loader {
      border: 3px solid #ccc;
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }
    .version-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 20px;
  background: rgba(34, 197, 94, 0.1);
  color: #22c55e;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid rgba(34, 197, 94, 0.3);
}

.dot {
  width: 8px;
  height: 8px;
  background: #22c55e;
  border-radius: 50%;
  position: relative;
}

.dot::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: #22c55e;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
  opacity: 0.6;
}
/* 📱 Mobile Responsive Fix */
@media (max-width: 768px) {

  header {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  /*#chat {
    padding: 10px;
    
  }*/

  .message {
    max-width: 90%;
  }

  .input-area {
    flex-direction: column;
    gap: 8px;
  }

  textarea {
    width: 100%;
    height: 60px;
    font-size: 14px;
  }

  select {
    width: 100%;
  }

  button.send {
    width: 100%;
    padding: 12px;
  }

  .actions {
    display: flex; /* Always visible on mobile */
    gap: 10px;
  }
}
/* #chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  height: calc(100vh - 140px); 
} */
.input-area {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: var(--input);
  position: sticky;
  bottom: 0;
}
button {
  min-height: 44px; /* mobile tap size */
}
.bubble {
  word-wrap: break-word;
}

pre {
  white-space: pre-wrap;
  word-break: break-word;
}
@keyframes pulse {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(2.5); opacity: 0; }
}
@media (max-width: 768px) {

  header {
    position: relative;
  }

  .toggle-btn {
    position: absolute;
    top: 10px;
    right: 15px;
  }

}
@media (max-width: 768px) {

  header {
  width: 100%;
  box-sizing: border-box; /* IMPORTANT */
}

}
 html, body {
  width: 100%;
  height: 100%;
}
    select {
  min-width: 140px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<header>
  <div>🤖 Yash QA AI Agent</div>
  

  <div style="display: flex; gap: 10px; align-items: center;">
    
    <div class="version-badge" title="App is in beta. Features may change and minor issues can occur.">
  <span class="dot"></span>
  v1.0-beta
</div>

    <button class="toggle-btn" onclick="toggleTheme()">🌗</button>
  
  </div>
</header>


<div id="chat"></div>

<div class="input-area">
  <textarea id="requirement" placeholder="Enter requirement..."></textarea>

  <select id="type">
    <option value="manual" selected>Manual</option>
    <option value="automation">Automation</option>
  </select>
  

  <button class="send" onclick="generate()">Generate Test Cases</button>
</div>

<script>
function toggleTheme() {
  document.body.classList.toggle("light");
}

function createMessage(content, isUser, type, showActions = true) {
  const msg = document.createElement("div");
  msg.className = "message " + (isUser ? "user" : "bot");

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  const pre = document.createElement("pre");
  pre.innerText = content;
  bubble.appendChild(pre);

  msg.appendChild(bubble);

  if (!isUser && showActions) { 
    const actions = document.createElement("div");
    actions.className = "actions";

    // Copy
    const copyBtn = document.createElement("button");
    copyBtn.innerText = "📋 Copy";
    copyBtn.onclick = () => {
  navigator.clipboard.writeText(content);

  copyBtn.innerText = "✅ Copied";

  setTimeout(() => {
    copyBtn.innerText = "📋 Copy";
  }, 2000);
};

    // Download
    const downloadBtn = document.createElement("button");
    downloadBtn.innerText = "⬇ Download";
    downloadBtn.onclick = () => downloadFile(content, type);

    actions.appendChild(copyBtn);
    actions.appendChild(downloadBtn);

    msg.appendChild(actions);
  }

  return msg;
}

function downloadFile(content, type) {
  const blob = new Blob([content], { type: "text/plain" });
  const a = document.createElement("a");

  const ext = type === "automation" ? "ts" : "txt";
  a.href = URL.createObjectURL(blob);
  a.download = "output." + ext;
  a.click();
}

async function generate() {
  const input = document.getElementById("requirement");
  const type = document.getElementById("type").value;
  const chat = document.getElementById("chat");

  if (!input.value.trim() || !type) {
    alert("Enter requirement & select type");
    return;
  }

  // ✅ Show user message first
  chat.appendChild(createMessage(input.value, true));

  // ✅ Loader
  const loader = document.createElement("div");
  loader.className = "loader";
  chat.appendChild(loader);

  try {
    const res = await fetch("https://yashqa-ai-agent.onrender.com/generate", {
      method: "POST",
      mode: "cors",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        requirement: input.value,
        type: type
      })
    });

    const data = await res.json();

    chat.removeChild(loader);

    // ✅ Now it's safe to use data
    chat.appendChild(createMessage(data.result, false, type));

    chat.scrollTop = chat.scrollHeight;
    input.value = "";

  } catch (err) {
    console.error(err);
    chat.removeChild(loader);

    chat.appendChild(createMessage("❌ Error: Failed to fetch response", false, "manual", false));
  }
}
const textarea = document.getElementById("requirement");

textarea.addEventListener("input", () => {
  textarea.style.height = "auto";
  textarea.style.height = textarea.scrollHeight + "px";
});
window.onload = () => {
  const chat = document.getElementById("chat");

  const msg = createMessage(
    "⚡ First response may take ~20–30 seconds due to backend cold start.",
    false,
    null,
  false // 👈 disables buttons
  );

  chat.appendChild(msg);
};
</script>

</body>
</html>
